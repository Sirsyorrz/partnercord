<head>
  <meta charset="UTF-8">
  <script>
    // Redirect to index preserving hash for SPA routing
    const path = window.location.pathname.replace('/partnercord', '');
    const hash = window.location.hash;
    sessionStorage.redirect = window.location.href;
    window.location.replace('/partnercord/' + (hash || ''));
  </script>
